<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <!-- Outer gold border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#D4AF37" stroke-width="0.8"/>
  <!-- Inner subtle border -->
  <rect x="3" y="3" width="26" height="26" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.3" opacity="0.4"/>
  <!-- "S" letter -->
  <text x="4" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#D4AF37" letter-spacing="-1">SL</text>
  <!-- Decorative bottom line -->
  <line x1="4" y1="26" x2="28" y2="26" stroke="#D4AF37" stroke-width="0.6" opacity="0.5"/>
</svg>
